name: Data Pipeline CI/CD

# Trigger this workflow every time code is pushed to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code-quality-and-testing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8 (Code Quality Scan)
        run: |
          # Stop the build on error
          flake8 dags/ --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Complexity Warning
          flake8 dags/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
